name: Generate RSS Feed

on:
  # Manual trigger
  workflow_dispatch:

  # Optional: Trigger on schedule (e.g., every hour)
  # schedule:
  #   - cron: '0 * * * *'

  # Optional: Trigger when Nostr events are published (would need a custom trigger)
  # repository_dispatch:

jobs:
  generate-rss:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: |
          npm ci

      - name: Generate RSS feed
        run: |
          npx -y tsx scripts/build-rss.ts

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload RSS artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/rss.xml
          retention-days: 7

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
        id: deployment
        with:
          artifact-name: rss-feed
